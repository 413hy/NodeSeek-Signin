name: 奶昔论坛签到

on:
  push:
    branches:
      - main
  schedule:
    - cron: '00 16 * * *'  # 北京时间 00:00 (UTC+8)，对应UTC时间 16:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-naixi-sign:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install requests

      - name: 随机等待到北京时间 07:00-09:00
        if: github.event_name == 'schedule'
        run: |
          delay=$(( RANDOM % 7201 ))
          echo "随机等待 ${delay} 秒后执行奶昔签到"
          sleep "$delay"

      - name: 运行奶昔论坛签到脚本
        env:
          NAIXI_COOKIE: ${{ secrets.NAIXI_COOKIE }}
          # 可选：如果自动提取 formhash 失败，再手动配置这个
          NAIXI_FORMHASH: ${{ secrets.NAIXI_FORMHASH }}

          # 复用原项目 notify.py 的 Telegram 推送配置
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_USER_ID: ${{ secrets.TG_USER_ID }}
          TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
        run: python naixi_sign.py
