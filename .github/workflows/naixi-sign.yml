name: 奶昔论坛签到

on:
  push:
    branches:
      - main
  schedule:
    - cron: '00 18 * * *'  # 北京时间 10:35 (UTC+8)，错开 GitHub Actions 整点高峰
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-naixi-sign:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install requests


      - name: 运行奶昔论坛签到脚本
        env:
          NAIXI_COOKIE: ${{ secrets.NAIXI_COOKIE || vars.NAIXI_COOKIE }}
          # 可选：如果签到页被 403 拦截，可直接配置完整签到 URL
          NAIXI_SIGN_URL: ${{ secrets.NAIXI_SIGN_URL || vars.NAIXI_SIGN_URL || 'https://forum.naixi.net/plugin.php?id=k_misign:sign&operation=qiandao&formhash=58451330&format=empty&inajax=1&ajaxtarget=' }}
          # 可选：如果自动提取 formhash 失败，再手动配置这个
          NAIXI_FORMHASH: ${{ secrets.NAIXI_FORMHASH || vars.NAIXI_FORMHASH }}

          # 复用原项目 notify.py 的 Telegram 推送配置
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_USER_ID: ${{ secrets.TG_USER_ID }}
          TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
        run: python naixi_sign.py
