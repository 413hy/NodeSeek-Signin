name: NodeLoc 签到

on:
  push:
    branches:
      - main
  schedule:
    - cron: '20 2 * * *'  # 北京时间 10:20 (UTC+8)，错开 GitHub Actions 整点高峰
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-nodeloc-sign:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          google-chrome --version || chromium-browser --version || true


      - name: 运行 NodeLoc 签到脚本
        env:
          NODELOC_COOKIE: ${{ secrets.NODELOC_COOKIE || secrets.NL_COOKIE || vars.NODELOC_COOKIE || vars.NL_COOKIE }}

          # 复用原项目 notify.py 的 Telegram 推送配置
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_USER_ID: ${{ secrets.TG_USER_ID }}
          TG_THREAD_ID: ${{ secrets.TG_THREAD_ID }}
        run: python nodeloc_sign.py
